name: zopia
description: ZOPIA - Social Media & Marketplace App
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^2.24.2
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.14.0
  firebase_storage: ^11.6.0
  firebase_messaging: ^14.7.10

  # State Management
  provider: ^6.1.1

  # UI
  google_fonts: ^6.1.0
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.9
  shimmer: ^3.0.0
  lottie: ^3.0.0
  smooth_page_indicator: ^1.1.0
  carousel_slider: ^4.2.1

  # Media
  image_picker: ^1.0.7
  video_player: ^2.8.2
  chewie: ^1.7.4

  # Chat
  dash_chat_2: ^0.0.21

  # Utils
  uuid: ^4.3.3
  intl: ^0.19.0
  timeago: ^3.6.0
  url_launcher: ^6.2.4
  share_plus: ^7.2.2
  permission_handler: ^11.3.0
  connectivity_plus: ^5.0.2
  flutter_local_notifications: ^16.3.2
  get_it: ^7.6.7

  # Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
